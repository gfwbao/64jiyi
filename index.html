// 把字符串里的繁体字逐字转成简体
function toSimplified(str) {
  var out = '';
  for (var i = 0; i < str.length; i++) {
    var c = str[i];
    out += T2S[c] || c;
  }
  return out;
}

// 规范化:转简体 + 去首尾空格(大小写不动,以免影响 duty 这类英文答案的设计)

  return toSimplified(str.trim());
}

const state = {
  filteredPuzzles: PUZZLES.slice(),
  currentIdx: 0,
  attempts: 0,
  solved: false,
  showHint: false,
  showAnswer: false,
  completed: new Set(),
  seen: new Set(),        // 已处理(答对或放弃)的题
  startTime: null,        // 首次作答的时间戳
  elapsedMs: 0,           // 完成时的总耗时
  totalAttempts: 0,       // 全程总尝试次数
  finished: false,        // 是否已完成全部题目
};

const DIFFICULTY = {
  1: { label: "易", color: "#65a30d" },
  2: { label: "中", color: "#ca8a04" },
  3: { label: "难", color: "#dc2626" },
};

function el(tag, props, ...children) {
  const e = document.createElement(tag);
  if (props) {
    for (const k in props) {
      if (k === 'className') e.className = props[k];
      else if (k === 'onClick') e.addEventListener('click', props[k]);
      else if (k === 'onKeyDown') e.addEventListener('keydown', props[k]);
      else if (k === 'style') Object.assign(e.style, props[k]);
      else if (k === 'disabled') e.disabled = props[k];
      else e.setAttribute(k, props[k]);
    }
  }
  children.flat().forEach(c => {
    if (c == null || c === false) return;
    if (typeof c === 'string' || typeof c === 'number') e.appendChild(document.createTextNode(c));
    else e.appendChild(c);
  });
  return e;
}

function getCurrentPuzzle() {
  return state.filteredPuzzles[state.currentIdx];
}

function resetPuzzleState() {
  state.attempts = 0;
  state.solved = false;
  state.showHint = false;
  state.showAnswer = false;
}

function renderTemplate() {
  const display = document.getElementById('template-display');
  display.innerHTML = '';
  const puzzle = getCurrentPuzzle();
  const reveal = state.solved || state.showAnswer;
  let blankIdx = 0;
  for (let i = 0; i < puzzle.template.length; i++) {
    const ch = puzzle.template[i];
    if (ch === '_') {
      const span = document.createElement('span');
      span.className = 'blank' + (reveal ? ' revealed' : '');
      span.textContent = reveal ? (puzzle.answer[blankIdx] || '?') : '\u3000';
      display.appendChild(span);
      blankIdx++;
    } else if (ch === ' ') {
      display.appendChild(document.createTextNode(' '));
    } else {
      const span = document.createElement('span');
      span.className = 'template-char';
      span.textContent = ch;
      display.appendChild(span);
    }
  }
}

function renderMeta() {
  const puzzle = getCurrentPuzzle();
  document.getElementById('card-meta-left').textContent =
    '第 ' + (state.currentIdx + 1) + ' / ' + state.filteredPuzzles.length + ' 题 · ' + puzzle.category;
  const diff = DIFFICULTY[puzzle.difficulty] || DIFFICULTY[1];
  const badge = document.getElementById('difficulty-badge');
  badge.textContent = diff.label;
  badge.style.background = diff.color;
}

function renderInteractive() {
  const area = document.getElementById('interactive-area');
  area.innerHTML = '';
  const puzzle = getCurrentPuzzle();

  if (!state.solved && !state.showAnswer) {
    const inputRow = el('div', { className: 'input-row' });
    const input = el('input', {
      id: 'guess-input',
      type: 'text',
      placeholder: '输入答案...',
      autocomplete: 'off',
      autocorrect: 'off',
      autocapitalize: 'off',
      spellcheck: 'false',
      onKeyDown: function(e) { if (e.key === 'Enter') handleSubmit(); }
    });
    const submitBtn = el('button', {
      className: 'submit-btn',
      onClick: handleSubmit
    }, '提交');
    inputRow.appendChild(input);
    inputRow.appendChild(submitBtn);
    area.appendChild(inputRow);

    if (state.attempts > 0) {
      area.appendChild(el('div', { className: 'attempts-info' },
        '已尝试 ' + state.attempts + ' 次'));
    }

    const actions = el('div', { className: 'actions' });
    if (!state.showHint && state.attempts >= 2) {
      actions.appendChild(el('button', {
        className: 'action-btn hint-btn',
        onClick: function() { state.showHint = true; renderInteractive(); }
      }, '看提示'));
    }
    if (state.attempts >= 4) {
      actions.appendChild(el('button', {
        className: 'action-btn reveal-btn',
        onClick: function() {
          state.showAnswer = true;
          state.solved = true;
          state.seen.add(getCurrentPuzzle().id);
          if (checkFinished()) return;
          renderAll();
        }
      }, '放弃,看答案'));
    }
    if (actions.children.length > 0) area.appendChild(actions);

    if (state.showHint) {
      area.appendChild(el('div', {
        className: 'hint-box fadeIn'
      }, '提示:' + puzzle.hint));
    }

    setTimeout(function() {
      const inp = document.getElementById('guess-input');
      if (inp) inp.focus();
    }, 0);
  } else {
    const isRevealOnly = state.showAnswer && !state.completed.has(puzzle.id);
    const answerBox = el('div', {
      className: 'answer-box fadeIn' + (isRevealOnly ? ' revealed-only' : '')
    },
      el('div', { className: 'answer-label' },
        isRevealOnly ? '答案' : ('第 ' + state.attempts + ' 次猜中')),
      el('div', { className: 'answer-text' }, puzzle.display || puzzle.answer)
    );
    area.appendChild(answerBox);
    area.appendChild(el('div', { className: 'explain-box' }, puzzle.explain));
  }
}

function renderNav() {
  const prev = document.getElementById('prev-btn');
  const next = document.getElementById('next-btn');
  prev.disabled = state.currentIdx === 0;
  const isLast = state.currentIdx === state.filteredPuzzles.length - 1;
  next.disabled = isLast;
  next.className = 'nav-btn' + (state.solved && !isLast ? ' next-active' : '');
}

function renderProgressBar() {
  const bar = document.getElementById('progress-bar');
  bar.innerHTML = '';
  state.filteredPuzzles.forEach(function(p, i) {
    const dot = el('div', {
      className: 'progress-dot' +
        (state.completed.has(p.id) ? ' completed' :
         (i === state.currentIdx ? ' current' : '')),
      title: p.category,
      onClick: function() { state.currentIdx = i; resetPuzzleState(); renderAll(); }
    });
    bar.appendChild(dot);
  });
  document.getElementById('progress-count').textContent =
    state.completed.size + ' / ' + PUZZLES.length;
}

function renderAll() {
  renderMeta();
  renderTemplate();
  renderInteractive();
  renderNav();
  renderProgressBar();
}

function handleSubmit() {
  const input = document.getElementById('guess-input');
  if (!input) return;
  const g = input.value.trim();
  if (!g || state.solved) return;
  // 首次作答启动计时
  if (state.startTime === null) state.startTime = Date.now();
  state.attempts++;
  state.totalAttempts++;
  const puzzle = getCurrentPuzzle();
  // 简繁归一后匹配:用户输入繁体或简体都算对
  var normalizedGuess = normalizeAnswer(g);
  var matched = puzzle.accepts.some(function(a) {
    return normalizeAnswer(a) === normalizedGuess;
  });
  if (matched) {
    state.solved = true;
    state.completed.add(puzzle.id);
    state.seen.add(puzzle.id);
    if (checkFinished()) return;
    renderAll();
  } else {
    input.value = '';
    const card = document.getElementById('puzzle-card');
    card.classList.add('wrong', 'shake');
    setTimeout(function() { card.classList.remove('shake'); }, 400);
    setTimeout(function() { card.classList.remove('wrong'); }, 600);
    renderInteractive();
  }
}

// 检测是否所有题目都已处理(答对或放弃),若是则进入完成页
function checkFinished() {
  if (state.seen.size === PUZZLES.length && !state.finished) {
    state.finished = true;
    state.elapsedMs = state.startTime ? (Date.now() - state.startTime) : 0;
    renderFinishScreen();
    return true;
  }
  return false;
}

// 格式化耗时:毫秒 -> "X 分 Y 秒"
function formatDuration(ms) {
  const totalSec = Math.round(ms / 1000);
  const min = Math.floor(totalSec / 60);
  const sec = totalSec % 60;
  if (min === 0) return sec + ' 秒';
  return min + ' 分 ' + sec + ' 秒';
}

// 完成页面
function renderFinishScreen() {
  const container = document.querySelector('.container');
  container.innerHTML = '';

  const wrap = el('div', {
    className: 'fadeIn',
    style: { textAlign: 'center', padding: '40px 16px 20px' }
  });

  wrap.appendChild(el('div', {
    style: {
      fontSize: '13px', color: '#888', letterSpacing: '0.2em', marginBottom: '16px'
    }
  }, '全 部 填 空 已 完 成'));

  wrap.appendChild(el('h1', {
    style: {
      fontSize: '32px', fontWeight: 900, letterSpacing: '0.06em', marginBottom: '8px',
      background: 'linear-gradient(90deg, #dc2626, #f97316)',
      webkitBackgroundClip: 'text', backgroundClip: 'text',
      webkitTextFillColor: 'transparent'
    }
  }, '记忆已复原'));

  wrap.appendChild(el('p', {
    style: { fontSize: '13px', color: '#999', lineHeight: 1.8, marginBottom: '32px', maxWidth: '420px', marginLeft: 'auto', marginRight: 'auto' }
  }, '你填回了这 ' + PUZZLES.length + ' 个被消音的词。每一个空格,都是一次对遗忘的抵抗。'));

  // 统计卡片
  const stats = el('div', {
    style: {
      display: 'flex', justifyContent: 'center', gap: '12px',
      flexWrap: 'wrap', marginBottom: '36px'
    }
  });

  function statCard(label, value) {
    return el('div', {
      style: {
        background: '#0f0f0f', border: '1px solid #222',
        padding: '18px 22px', minWidth: '120px'
      }
    },
      el('div', { style: { fontSize: '26px', fontWeight: 900, color: '#fff', marginBottom: '4px' } }, value),
      el('div', { style: { fontSize: '11px', color: '#666', letterSpacing: '0.1em' } }, label)
    );
  }

  stats.appendChild(statCard('总耗时', formatDuration(state.elapsedMs)));
  stats.appendChild(statCard('完成题数', PUZZLES.length + ' 题'));
  stats.appendChild(statCard('总尝试', state.totalAttempts + ' 次'));
  wrap.appendChild(stats);

  // 重新开始按钮
  const restartBtn = el('button', {
    style: {
      padding: '12px 28px', background: '#dc2626', color: '#fff',
      border: 'none', fontSize: '14px', fontWeight: 700,
      letterSpacing: '0.05em', marginBottom: '40px'
    },
    onClick: function() { location.reload(); }
  }, '再来一次');
  wrap.appendChild(restartBtn);

  // footer
  wrap.appendChild(el('footer', {
    style: {
      marginTop: '20px', paddingTop: '20px', borderTop: '1px solid #222',
      fontSize: '10px', color: '#555', lineHeight: 1.8
    }
  }, el('span', null, '不正确记忆 · 六四专题'), el('br'), el('span', null, '愿真相不被遗忘')));

  container.appendChild(wrap);
}

document.getElementById('prev-btn').addEventListener('click', function() {
  if (state.currentIdx > 0) {
    state.currentIdx--;
    resetPuzzleState();
    renderAll();
  }
});

document.getElementById('next-btn').addEventListener('click', function() {
  if (state.currentIdx < state.filteredPuzzles.length - 1) {
    state.currentIdx++;
    resetPuzzleState();
    renderAll();
  }
});

document.getElementById('total-count').textContent = PUZZLES.length;
renderAll();
</script>
